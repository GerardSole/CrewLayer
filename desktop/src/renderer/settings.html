<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex; flex-direction: column; height: 100%;
      background: #111; border-radius: 12px; overflow: hidden;
    }

    /* Header */
    .win-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      -webkit-app-region: drag; flex-shrink: 0;
    }
    .win-title { font-size: 14px; font-weight: 600; }

    /* Scrollable body */
    .win-body {
      flex: 1; overflow-y: auto; padding: 20px 20px 0;
      -webkit-app-region: no-drag;
    }

    .section-title {
      font-size: 10.5px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 14px;
    }

    .section { margin-bottom: 24px; }

    .info-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--muted); }
    .info-value { color: var(--text); font-weight: 500; }

    /* Footer buttons */
    .win-footer {
      padding: 14px 20px;
      display: flex; gap: 8px; justify-content: flex-end;
      border-top: 1px solid var(--border);
      -webkit-app-region: no-drag;
    }

    .save-status {
      font-size: 12px; color: var(--accent);
      opacity: 0; transition: opacity .3s; align-self: center; flex: 1;
    }
    .save-status.show { opacity: 1; }
  </style>
</head>
<body>

<div class="win-header drag">
  <span class="win-title">Settings</span>
  <button class="btn-icon no-drag" id="btnClose" title="Close">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
      <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </button>
</div>

<div class="win-body">

  <!-- ── API ──────────────────────────── -->
  <div class="section">
    <p class="section-title">API</p>

    <label class="field-label">API Key</label>
    <div class="field-row" style="margin-bottom:14px;">
      <input class="input" id="apiKeyInput" readonly type="password" />
      <button class="btn btn-ghost" id="toggleShow" style="flex-shrink:0;font-size:12px;">Show</button>
      <button class="btn btn-ghost" id="copyKey" style="flex-shrink:0;font-size:12px;">Copy</button>
    </div>

    <label class="field-label">API Port</label>
    <input class="input" id="portInput" type="number" min="1024" max="65535"
           style="width:120px;margin-bottom:14px;" />
    <p style="font-size:11.5px;color:#555;margin-top:-10px;margin-bottom:14px;">
      Changing the port requires restarting the app.
    </p>

    <label class="field-label">Anthropic API Key (optional)</label>
    <input class="input" id="anthropicKeyInput" type="password"
           placeholder="sk-ant-…" style="margin-bottom:4px;" />
    <p style="font-size:11.5px;color:#555;margin-bottom:14px;">
      Used for automatic memory extraction and embeddings.
    </p>
  </div>

  <hr class="sep" />

  <!-- ── Services ─────────────────────── -->
  <div class="section">
    <p class="section-title">Services</p>

    <div class="info-row">
      <span class="info-label">PostgreSQL</span>
      <span class="info-value" id="pgStatus">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Redis</span>
      <span class="info-value" id="redisStatus">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">API</span>
      <span class="info-value" id="apiStatus">—</span>
    </div>

    <button class="btn btn-outline" id="btnRestart"
            style="margin-top:14px;font-size:12.5px;">Restart Services</button>
  </div>

  <hr class="sep" />

  <!-- ── Data ─────────────────────────── -->
  <div class="section">
    <p class="section-title">Data</p>

    <label class="field-label">Data Directory</label>
    <input class="input" id="dataDirInput" readonly style="margin-bottom:14px;font-size:12px;" />

    <button class="btn btn-danger" id="btnReset" style="font-size:12.5px;">
      Reset All Data…
    </button>
    <p style="font-size:11.5px;color:#555;margin-top:8px;">
      Deletes all agents, memories, and actions. Cannot be undone.
    </p>
  </div>

  <hr class="sep" />

  <!-- ── About ─────────────────────────── -->
  <div class="section">
    <p class="section-title">About</p>
    <div class="info-row">
      <span class="info-label">Version</span>
      <span class="info-value" id="versionVal">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">License</span>
      <span class="info-value">MIT</span>
    </div>
    <div style="margin-top:14px;display:flex;gap:8px;">
      <button class="btn btn-ghost" id="btnCheckUpdate" style="font-size:12.5px;">Check for updates</button>
      <button class="btn btn-ghost" id="btnDocs" style="font-size:12.5px;">Documentation ↗</button>
    </div>
  </div>

  <div style="height:20px;"></div>
</div><!-- /body -->

<div class="win-footer">
  <span class="save-status" id="saveStatus">Settings saved</span>
  <button class="btn btn-ghost" id="btnCancel">Cancel</button>
  <button class="btn btn-primary" id="btnSave">Save</button>
</div>

<script>
(async () => {
  const s = await window.cl.getSettings();

  // Populate fields
  document.getElementById('apiKeyInput').value    = s.apiKey || '';
  document.getElementById('portInput').value      = s.apiPort || 8000;
  document.getElementById('anthropicKeyInput').value = s.anthropicApiKey || '';
  document.getElementById('dataDirInput').value   = s.dataDir || '';
  document.getElementById('versionVal').textContent = s.version || '—';

  // Status
  function updateStatus({ api, postgres, redis }) {
    const mk = (on) => `<span class="badge ${on ? 'badge-green' : 'badge-red'}">${on ? 'running' : 'stopped'}</span>`;
    document.getElementById('pgStatus').innerHTML    = mk(postgres);
    document.getElementById('redisStatus').innerHTML = mk(redis);
    document.getElementById('apiStatus').innerHTML   = mk(api);
  }
  updateStatus(await window.cl.getStatus());
  window.cl.onStatus(updateStatus);

  // Show/hide key
  const keyInput = document.getElementById('apiKeyInput');
  document.getElementById('toggleShow').addEventListener('click', function() {
    const show = keyInput.type === 'password';
    keyInput.type = show ? 'text' : 'password';
    this.textContent = show ? 'Hide' : 'Show';
  });
  document.getElementById('copyKey').addEventListener('click', () => {
    window.cl.copy(s.apiKey || '');
    document.getElementById('copyKey').textContent = 'Copied!';
    setTimeout(() => { document.getElementById('copyKey').textContent = 'Copy'; }, 2000);
  });

  // Restart
  document.getElementById('btnRestart').addEventListener('click', async () => {
    document.getElementById('btnRestart').textContent = 'Restarting…';
    await window.cl.restartServices();
    document.getElementById('btnRestart').textContent = 'Restart Services';
  });

  // Reset
  document.getElementById('btnReset').addEventListener('click', () => window.cl.resetData());

  // Save
  document.getElementById('btnSave').addEventListener('click', async () => {
    await window.cl.saveSettings({
      apiPort:       Number(document.getElementById('portInput').value) || 8000,
      anthropicApiKey: document.getElementById('anthropicKeyInput').value.trim(),
    });
    const el = document.getElementById('saveStatus');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  });

  // Cancel / close
  document.getElementById('btnCancel').addEventListener('click', () => window.cl.closeWindow());
  document.getElementById('btnClose').addEventListener('click',  () => window.cl.closeWindow());

  // About
  document.getElementById('btnCheckUpdate').addEventListener('click', () => window.cl.checkUpdates());
  document.getElementById('btnDocs').addEventListener('click', () =>
    window.cl.openExternal('https://crewlayer-docs.vercel.app/')
  );
})();
</script>
</body>
</html>
