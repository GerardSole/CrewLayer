<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrewLayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { overflow: hidden; }

    /* ── Update banner ─────────────────────────── */
    #update-banner {
      display: none;
      background: rgba(34,197,94,.12);
      border-bottom: 1px solid var(--accent-border);
      padding: 7px 16px;
      font-size: 12.5px; color: var(--accent);
      align-items: center; gap: 10px;
    }
    #update-banner.visible { display: flex; }
    #update-banner a {
      color: var(--accent); font-weight: 600;
      text-decoration: underline; cursor: pointer;
    }

    /* ── Toolbar ───────────────────────────────── */
    .toolbar {
      height: var(--toolbar-h);
      display: flex; align-items: center;
      padding: 0 12px 0 16px; gap: 10px;
      background: #0d0d0d; border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }

    /* On macOS with hiddenInset, traffic lights are at x:16, reserve space */
    .toolbar-spacer-mac { width: 70px; flex-shrink: 0; }
    @media not (prefers-reduced-motion: reduce) {
      .toolbar-spacer-mac { display: none; }
    }

    .logo-wrap {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 700; letter-spacing: -0.03em;
      color: var(--text); text-decoration: none;
      flex-shrink: 0;
    }

    .divider {
      width: 1px; height: 18px; background: var(--border);
      margin: 0 4px;
    }

    /* ── Status indicators ─────────────────────── */
    .status-row {
      display: flex; align-items: center; gap: 16px;
      flex: 1;
    }
    .status-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 11.5px; color: var(--muted); font-weight: 500;
    }

    /* ── Right controls ────────────────────────── */
    .controls {
      display: flex; align-items: center; gap: 4px;
      -webkit-app-region: no-drag;
    }

    /* Windows/Linux window controls */
    .win-controls {
      display: none;
      align-items: center;
      margin-left: 4px;
    }
    .win-btn {
      width: 46px; height: var(--toolbar-h);
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); transition: background .15s, color .15s;
    }
    .win-btn:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .win-btn.close:hover { background: #e81123; color: #fff; }
  </style>
</head>
<body>

<div id="update-banner">
  <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
    <path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <span id="update-text">A new version of CrewLayer is available.</span>
  <a id="update-link">Install update →</a>
</div>

<header class="toolbar drag">
  <!-- Mac traffic-light spacer (only shown on macOS) -->
  <div class="toolbar-spacer-mac" id="macSpacer" style="display:none"></div>

  <a class="logo-wrap no-drag" id="openDash" title="Open Dashboard">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="15" width="18" height="4" rx="2" fill="#22c55e" opacity="0.95"/>
      <rect x="3" y="10" width="18" height="4" rx="2" fill="#22c55e" opacity="0.6"/>
      <rect x="3" y="5"  width="18" height="4" rx="2" fill="#22c55e" opacity="0.28"/>
    </svg>
    CrewLayer
  </a>

  <div class="divider"></div>

  <div class="status-row no-drag">
    <div class="status-item">
      <span class="dot dot-off" id="dot-api"></span>
      API
    </div>
    <div class="status-item">
      <span class="dot dot-off" id="dot-postgres"></span>
      PostgreSQL
    </div>
    <div class="status-item">
      <span class="dot dot-off" id="dot-redis"></span>
      Redis
    </div>
  </div>

  <div class="controls">
    <button class="btn-icon no-drag" id="btnSettings" title="Settings">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M8 1v1.5M8 13.5V15M15 8h-1.5M2.5 8H1M12.36 3.64l-1.06 1.06M4.7 11.3l-1.06 1.06M12.36 12.36l-1.06-1.06M4.7 4.7l-1.06-1.06" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="btn-icon no-drag" id="btnTray" title="Minimize to tray">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <path d="M2 4l6 6 6-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Windows/Linux: close button -->
    <div class="win-controls" id="winControls">
      <button class="win-btn close" id="btnClose" title="Quit">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<script>
(async () => {
  const s = await window.cl.getSettings();
  const isMac = s.platform === 'darwin';

  if (isMac) {
    document.getElementById('macSpacer').style.display = 'block';
  } else {
    document.getElementById('winControls').style.display = 'flex';
  }

  // Status dots
  function applyStatus({ api, postgres, redis }) {
    const set = (id, on) => {
      const el = document.getElementById(id);
      el.className = 'dot ' + (on ? 'dot-on' : 'dot-off');
    };
    set('dot-api',      api);
    set('dot-postgres', postgres);
    set('dot-redis',    redis);
  }

  // Initial status
  applyStatus(await window.cl.getStatus());
  window.cl.onStatus(applyStatus);

  // Buttons
  document.getElementById('btnSettings').addEventListener('click', () => window.cl.openSettings());
  document.getElementById('btnTray').addEventListener('click',     () => window.cl.minimizeToTray());
  document.getElementById('openDash').addEventListener('click',    () => {});
  document.getElementById('btnClose')?.addEventListener('click',   () => {
    window.cl.saveSettings({}).then(() => window.cl.minimizeToTray());
  });

  // Update banner
  window.cl.onUpdate(({ version }) => {
    document.getElementById('update-text').textContent = `CrewLayer ${version} is available.`;
    document.getElementById('update-banner').classList.add('visible');
  });
  document.getElementById('update-link').addEventListener('click', () => window.cl.checkUpdates());
})();
</script>
</body>
</html>
