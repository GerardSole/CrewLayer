appId: ai.crewlayer.app
productName: CrewLayer
copyright: "Copyright © 2025 CrewLayer. MIT License."

directories:
  output: dist
  buildResources: assets

files:
  - src/**/*
  - node_modules/**/*
  - "!**/{.DS_Store,Thumbs.db,__pycache__}"
  - "!**/node_modules/*/{README*,CHANGELOG*,test,tests,__tests__,example,examples}"

asarUnpack:
  - "**/embedded-postgres/**"
  - "**/@embedded-postgres/**"
  - "**/*.node"

extraResources:
  - from: resources/backend
    to: backend
    filter:
      - "**/*"
  - from: resources/redis
    to: redis
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

linux:
  icon: assets/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CrewLayer

publish:
  provider: github
  owner: GerardSole
  repo: CrewLayer
