name: Publish SDK to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── 1. Run SDK tests before publishing ────────────────────────────────────
  test:
    name: Test Python SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install SDK + dev dependencies
        run: |
          cd sdk
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd sdk
          pytest tests/ -v --tb=short

  # ── 2. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: |
          cd sdk
          python -m build

      - name: Check distribution
        run: |
          pip install twine
          cd sdk
          twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sdk/dist/
          if-no-files-found: error

  # ── 3. Publish to PyPI via OIDC trusted publishing ────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build

    # Required for OIDC trusted publishing — no API key stored in secrets
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/crewlayer/

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` needed — OIDC authenticates via id-token
